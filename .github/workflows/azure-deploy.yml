name: Build and Deploy to Azure Web App

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Build client
        run: npm run build --prefix client

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Prepare deploy package (exclude node_modules)
        run: |
          rm -rf deploy || true
          mkdir -p deploy/client
          cp package.json deploy/
          cp -r backend deploy/
          rm -rf deploy/backend/node_modules || true
          # ensure client build exists
          if [ -d client/dist ]; then
            mkdir -p deploy/client
            cp -r client/dist deploy/client/
          else
            echo "ERROR: client/dist not found — build failed or path changed"
            ls -la client || true
            exit 1
          fi
          cp README.md deploy/ || true
          cp ai_prompt.txt deploy/ || true
          cd deploy
          zip -r ../deploy.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
